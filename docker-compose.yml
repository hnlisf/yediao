version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: yediao-postgres
    environment:
      POSTGRES_USER: yediao
      POSTGRES_PASSWORD: yediao123
      POSTGRES_DB: yediao
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yediao"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yediao-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: yediao-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: yediao
      DB_PASSWORD: yediao123
      DB_NAME: yediao
      JWT_SECRET: yediao-secret-key-2026-mvp
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build: ./web
    container_name: yediao-web
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
